summary: >
  Modified clanker-run to snapshot md5sums of clanker-run, clanker-prep,
  and CLAUDE.md before git maintenance. After clanker-prep runs (which
  fast-forwards main), if any of those files changed, a restart flag file
  is created and the flock subshell exits cleanly. The outer script then
  re-execs itself with the updated code. This prevents spending Claude
  tokens with a stale runner after a git update.
